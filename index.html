<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Western Hemisphere Prison & Detention Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050d;--bg2:#0a0a18;--bg3:#0f0f22;
  --border:#1a1a35;--border2:#252545;
  --red:#dc2626;--red2:#ef4444;--red3:#fca5a5;
  --gold:#d97706;--gold2:#fbbf24;
  --green:#15803d;--green2:#22c55e;
  --blue:#1d4ed8;--blue2:#3b82f6;
  --purple:#7c3aed;--purple2:#a78bfa;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
}
body{background:var(--bg);color:var(--text);font-family:'Source Serif 4',Georgia,serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
.header{
  background:linear-gradient(160deg,#0d0020 0%,#12001a 30%,#080010 60%,var(--bg) 100%);
  border-bottom:1px solid #2a0a3a;
  padding:36px 40px 28px;
  position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 50%, rgba(120,0,180,0.08) 0%, transparent 60%),
             radial-gradient(ellipse at 80% 30%, rgba(180,0,80,0.06) 0%, transparent 50%);
  pointer-events:none;
}
.header-eyebrow{font-size:10px;letter-spacing:6px;color:#6b21a8;text-transform:uppercase;margin-bottom:10px;font-family:'Source Serif 4',serif}
.header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,5vw,52px);
  font-weight:900;line-height:1.05;
  color:#fff;margin-bottom:8px;
  letter-spacing:-1px;
}
.header h1 em{color:#c026d3;font-style:normal}
.header-sub{color:var(--text3);font-size:13px;max-width:680px;line-height:1.7;margin-bottom:20px;font-weight:300}
.status-row{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.status-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(21,128,61,0.12);border:1px solid rgba(34,197,94,0.25);border-radius:20px;padding:4px 14px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green2);box-shadow:0 0 6px var(--green2);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.status-pill span{color:var(--green2);font-size:11px;letter-spacing:.5px}
.region-pills{display:flex;gap:8px;flex-wrap:wrap}
.rpill{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:12px;padding:4px 12px;font-size:11px;color:var(--text3)}
.kpi-row{display:flex;gap:12px;flex-wrap:wrap}
.kpi{background:rgba(255,255,255,0.03);border:1px solid;border-radius:8px;padding:14px 18px;flex:1 1 135px;transition:border-color .2s}
.kpi:hover{border-color:rgba(255,255,255,0.2)}
.kv{font-size:clamp(18px,2.5vw,26px);font-weight:700;font-family:'Playfair Display',serif;letter-spacing:-0.5px}
.kl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.ks{font-size:10px;color:var(--text3);margin-top:2px}

/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 40px;display:flex;overflow-x:auto;gap:2px}
.tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;padding:13px 18px;font-family:'Source Serif 4',serif;font-size:12px;white-space:nowrap;color:var(--text3);letter-spacing:.3px;transition:all .2s}
.tab:hover{color:var(--red2)}
.tab.active{color:var(--red2);border-bottom-color:var(--red2);font-weight:600}

/* CONTENT */
.content{padding:32px 40px;max-width:1500px;margin:0 auto}
.sec-title{font-family:'Playfair Display',serif;color:var(--red2);font-size:22px;margin-bottom:6px;letter-spacing:-0.5px}
.sec-sub{color:var(--text3);font-size:13px;margin-bottom:24px;line-height:1.6;max-width:800px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:22px}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:2.5px;color:var(--text3);margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* BAR CHARTS */
.bchart{display:flex;flex-direction:column;gap:9px}
.brow{display:flex;align-items:center;gap:10px}
.blbl{width:155px;text-align:right;color:var(--text2);flex-shrink:0;font-size:11px}
.btrack{flex:1;background:rgba(255,255,255,0.05);border-radius:3px;height:20px;overflow:hidden}
.bfill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:8px;font-size:10px;color:rgba(255,255,255,0.9);font-weight:600;white-space:nowrap;transition:width 1s ease}
.bval{width:65px;color:var(--text3);font-size:10px;flex-shrink:0}

/* TABLES */
table{border-collapse:collapse;width:100%;font-size:12px}
th{padding:9px 13px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--red2);background:#0d0020;border-bottom:1px solid #2a0a3a;white-space:nowrap;font-family:'Source Serif 4',serif}
td{padding:8px 13px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:rgba(255,255,255,0.02)}
.tw{overflow-x:auto}

/* SORT/FILTER BUTTONS */
.sbtn{background:none;border:1px solid var(--border2);color:var(--text3);padding:5px 12px;border-radius:4px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:11px;margin-right:5px;transition:all .2s}
.sbtn.on,.sbtn:hover{background:#3b0764;border-color:var(--purple2);color:var(--purple2)}
.fbtn{background:none;border:1px solid var(--border2);color:var(--text3);padding:5px 13px;border-radius:4px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:11px;margin-right:5px}
.fbtn.on{background:#1e1b4b;border-color:var(--blue2);color:#93c5fd}

/* COUNTRY CARDS */
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.cc:hover{border-color:rgba(192,38,211,0.3)}
.cc-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.cc-body{background:rgba(0,0,0,0.3);border-top:1px solid var(--border);padding:18px 20px;font-size:12px;line-height:1.7;color:var(--text2);display:none}
.cc-body.open{display:block}
.cc-hint{background:rgba(0,0,0,0.2);padding:4px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);letter-spacing:1px}
.badge{display:inline-block;padding:2px 9px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-right:5px}
.flag{font-size:22px;margin-right:8px}

/* RATE INDICATOR */
.rate-bar{height:6px;border-radius:3px;background:linear-gradient(to right,#15803d,#d97706,#dc2626);position:relative;margin-top:4px}
.rate-marker{position:absolute;top:-3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid #dc2626;transform:translateX(-50%)}

/* REGION SECTIONS */
.region-header{display:flex;align-items:center;gap:12px;margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.region-header h3{font-family:'Playfair Display',serif;color:var(--text2);font-size:17px}
.region-count{background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--text3)}

/* NEWS */
.news-card{background:rgba(0,0,0,0.3);border-radius:6px;padding:14px;border-left:3px solid}
.news-date{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:.5px}
.news-head{font-weight:600;color:#fed7aa;font-size:13px;margin-bottom:5px;font-family:'Playfair Display',serif}
.news-body{color:#78716c;font-size:11px;line-height:1.6}

/* SOURCES */
.src-row{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}

/* HIGHLIGHT NUMBERS */
.hl-red{color:var(--red2);font-weight:700}
.hl-gold{color:var(--gold2);font-weight:700}
.hl-green{color:var(--green2);font-weight:700}
.hl-blue{color:var(--blue2);font-weight:700}

/* FOOTER */
.footer{margin-top:48px;border-top:1px solid var(--border);padding-top:18px;color:var(--text3);font-size:11px;line-height:1.8}

@media(max-width:900px){
  .header{padding:24px 20px 20px}
  .content{padding:20px}
  .grid2,.grid3{grid-template-columns:1fr!important}
  .tabs{padding:0 20px}
  .blbl{width:90px}
}
</style>
</head>

function fmt(n){if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n?n.toLocaleString():'N/A';}
function badge(text,color){return '<span class="badge" style="background:'+color+'18;color:'+color+';border:1px solid '+color+'40">'+text+'</span>';}

function kpi(label,val,sub,accent){
  return '<div class="kpi" style="border-color:'+accent+'30"><div class="kv" style="color:'+accent+'">'+val+'</div><div class="kl">'+label+'</div>'+(sub?'<div class="ks">'+sub+'</div>':'')+'</div>';
}
function bar(label,val,max,color,display){
  var pct=Math.min(Math.round(val/max*100),100);
  return '<div class="brow"><div class="blbl">'+label+'</div><div class="btrack"><div class="bfill" style="width:'+pct+'%;background:'+color+'">'+display+'</div></div><div class="bval">'+display+'</div></div>';
}

  var fn={overview:renderOverview,countries:renderCountries,compare:renderComparison,sources:renderSources}[tabId]||renderOverview;
  document.getElementById('tab-content').innerHTML=fn()
    +'<div class="footer">Data sourced from World Prison Brief, WOLA, HRW, IACHR, ICRC, PPI, national prison agencies. Population and budget figures are approximate — see Sources tab for individual country data provenance. Last updated: '+HEMI.last_updated+'. Next update: 2026-03-01.</div>';
}

function init(){
  var h=HEMI;
  document.getElementById('app').innerHTML=
    '<div class="header">'

    +'</div>'
    +'<div class="kpi-row">'
    +kpi('Countries Covered','35','North + Central + South America + Caribbean','#c026d3')

    +kpi('Highest Rate','1,659/100K','El Salvador (2025)','#f97316')
    +kpi('Lowest Rate','88/100K','Canada (2024)','#22c55e')

    +'<div class="content"><div id="tab-content"></div></div>';
  renderTab('overview');

document.addEventListener('DOMContentLoaded', function(){init();});
</script>
