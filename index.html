var activeTab = 'overview', sortKey = 'seized2024';

function fmt(n){ if(!n)return 'N/A'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(0)+'K'; return n.toLocaleString(); }
function badge(t,c){ return '<span class="badge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'40">'+t+'</span>'; }
function kpi(l,v,s,a){ return '<div class="kpi" style="border-color:'+a+'30"><div class="kv" style="color:'+a+'">'+v+'</div><div class="kl">'+l+'</div>'+(s?'<div class="ks">'+s+'</div>':'')+'</div>'; }
function bar(lbl,val,max,color,disp){
  var pct=max>0?Math.min(Math.round(val/max*100),100):0;
  return '<div class="brow"><div class="blbl">'+lbl+'</div><div class="btrack"><div class="bfill" style="width:'+pct+'%;background:'+color+'">'+disp+'</div></div><div class="bval">'+disp+'</div></div>';
}
function tog(id){ var el=document.getElementById(id); if(el) el.classList.toggle('open'); }

function renderOverview(){

  return '<h2 class="sec-title">National Overview</h2>'
  +'<p class="sec-sub">An estimated 500,000 contraband cell phones are in active use across U.S. prisons at any given time — roughly 1 in 4 inmates has access. Seizures represent only ~20% of estimated total devices, as detection rates remain low without jamming technology.</p>'

  +'</div></div>'

  +'<div class="card"><div class="ct">How Phones Are Used — Estimated Usage Split</div><div class="bchart">'

  +'</div></div>'
  +[
    {name:"Urban Institute — Contraband Cell Phones Needs Assessment 2024",url:"urban.org",freq:"Annual",what:"Best national survey. 20 state DOCs with comprehensive statistical data. Foundation for all national estimates."},
    {name:"FCC — GN Docket No. 13-111 (CIS Approvals)",url:"fcc.gov",freq:"Ongoing",what:"Contraband Interdiction System approvals, NPRM updates, jamming policy developments."},
    {name:"Georgia DOC / GA Attorney General",url:"law.georgia.gov",freq:"Monthly",what:"Highest-volume state. Press releases with seizure totals. Best source for current national numbers."},
    {name:"South Carolina DOC / SC AG",url:"scag.gov",freq:"Quarterly",what:"Pioneer state on managed access and policy advocacy. Grand jury reports. Highest per-inmate rate historically."},
    {name:"WOLA — Prison Tech Monitoring",url:"wola.org",freq:"Monthly",what:"Washington Office on Latin America also covers US prison technology policy."},
    {name:"Prison Policy Initiative — Contraband Phones",url:"prisonpolicy.org",freq:"Monthly",what:"Critical analysis of jamming policy, FCC regulation, telecom contractor interests. Filter Magazine (filtermag.org) is sister publication."},
    {name:"Insight Crime — Prison Gangs",url:"insightcrime.org",freq:"Monthly",what:"Best source for gang-phone connection, organized crime run from prison cells."},
    {name:"Congressional Research Service / GAO",url:"gao.gov / crs.gov",freq:"Annual",what:"GAO-11-893 is the foundational state-level historical dataset. Periodic updates on BOP technology programs."},
    {name:"BOP Annual Statistics",url:"bop.gov/about/statistics",freq:"Annual",what:"Federal prison contraband seizure data. Federal-only but useful for trend comparison."},
    {name:"FCC Sept 9, 2025 Fact Sheet — Jamming NPRM",url:"docs.fcc.gov/public/attachments/DOC-414416A1.pdf",freq:"One-time",what:"The primary FCC document on current jamming policy proposal. Essential reference for technology section."}
  ].map(function(s){
    return '<div class="src-row"><div><div style="font-weight:700;color:#fff;font-size:13px">'+s.name+'</div><div style="color:#3b82f6;font-size:11px;margin-top:2px">'+s.url+'</div><div style="color:#4b5563;font-size:11px;margin-top:2px">'+s.what+'</div></div>'+badge(s.freq,'#22c55e')+'</div>';
  }).join('');
}

var TABS=[
  {id:'overview',label:'📊 Overview'},
  {id:'states',label:'🗺 By State'},
  {id:'threats',label:'⚠️ Threats'},
  {id:'technology',label:'📡 Technology'},
  {id:'smuggling',label:'🚫 Smuggling'},
  {id:'seizures',label:'📦 Seizure Types'},
  {id:'legislation',label:'⚖️ Legislation'},
  {id:'sources',label:'📚 Sources'}
];

function renderTab(tabId){
  activeTab=tabId;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tabId);});
  var renderers={overview:renderOverview,states:renderByState,threats:renderThreats,technology:renderTechnology,smuggling:renderSmuggling,seizures:renderSeizureTypes,legislation:renderLegislation,sources:renderSources};
  var fn=renderers[tabId]||renderOverview;
  document.getElementById('tab-content').innerHTML=fn()
    +'<div class="footer">Sources: Urban Institute (2021/2024), FCC GN Docket 13-111, Georgia/South Carolina DOCs, FBI Law Enforcement Bulletin, GAO-11-893, NBC News, Prison Policy Initiative, Filter Magazine, congressional press releases. All national totals are estimates extrapolated from available state data — no single national dataset exists. Last updated: '+DATA.last_updated+'</div>';
}

function init(){
  var n=DATA.national;
  document.getElementById('app').innerHTML=
    '<div class="hdr">'
    +'<div class="eyebrow">U.S. Correctional Security · Contraband Intelligence Dashboard · '+n.data_as_of+'</div>'
    +'<h1>Contraband Cell Phones<br>in <em>U.S. Prisons</em></h1>'
    +'<p class="hdrsub">Estimated 500,000 unauthorized devices in active use across U.S. prisons. Seizures capture only ~20% of total. States legally barred from using the most effective countermeasure — signal jamming — while the FCC advances a historic rule change. Data as of '+n.data_as_of+'.</p>'
    +'<div class="status-pill"><span class="sdot"></span><span>Data current · Last updated '+DATA.last_updated+' · FCC jamming NPRM open for comment</span></div>'
    +'<div class="krow">'
    +kpi('Est. Devices in Circulation','~500K','1 in 4 inmates has access (Urban Institute)','#22c55e')
    +kpi('Annual Seizures (est.)','~100K','Only ~20% of estimated total devices','#f97316')
    +kpi('Phones per 1,000 Inmates','31 avg','Maximum: 366 in one facility (Urban Institute)','#d97706')
    +kpi('DOC Admins: Serious Threat','85%','Of all DOC administrators surveyed','#dc2626')
    +kpi('GA Seized in 2024','15,500+','Highest documented state total in nation','#dc2626')
    +kpi('FCC Jamming Vote','Sept 30, 2025','Unanimous 3-0 to advance — historic first','#22c55e')
    +'</div></div>'
    +'<div class="tabs">'+TABS.map(function(t){return '<button class="tab'+(t.id==='overview'?' active':'')+'" data-tab="'+t.id+'" onclick="renderTab(\''+t.id+'\')">'+t.label+'</button>';}).join('')+'</div>'
    +'<div class="con"><div id="tab-content"></div></div>';
  renderTab('overview');
}

document.addEventListener('DOMContentLoaded', function(){init();});
</script>
</body>
</html>
